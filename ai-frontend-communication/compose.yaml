name: developer-communication-agent

services:
  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      DCA_DOMAIN: ${DCA_DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  api:
    build: .
    restart: unless-stopped
    command: ["uv", "run", "--no-sync", "dca-api"]
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    volumes:
      - runtime:/runtime
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live')"]
      interval: 10s
      timeout: 3s
      retries: 10

  worker:
    build: .
    restart: unless-stopped
    command: ["uv", "run", "--no-sync", "dca-worker"]
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    volumes:
      - runtime:/runtime

  migrate:
    build: .
    command: ["uv", "run", "--no-sync", "alembic", "upgrade", "head"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dca
      POSTGRES_USER: dca
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dca}
    volumes:
      - postgres18_data:/var/lib/postgresql
    ports:
      - "127.0.0.1:${DCA_POSTGRES_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dca -d dca"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:8.2-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres18_data:
  runtime:
  caddy_data:
  caddy_config:
