# Append these server blocks to /srv/kakadudocs/deploy/nginx/kakaduai.com.conf.
# The edge container mounts only that file as default.conf; this artifact is not auto-loaded.
# Obtain the agency certificate before appending the TLS block. Keep kakaduai.com separate.

server {
    listen 80;
    listen [::]:80;
    server_name agency.kakaduai.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://agency.kakaduai.com$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name agency.kakaduai.com;

    ssl_certificate     /etc/letsencrypt/live/agency.kakaduai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agency.kakaduai.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    access_log /var/log/nginx/access.log timed_json;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Content-Security-Policy "frame-ancestors 'none'" always;

    client_max_body_size 1m;

    # Explicit application routes. The fallback serves the SPA and its client-side routes.
    location ^~ /api/ { try_files /__dca_native__ @dca_agency; }
    location ^~ /health/ { try_files /__dca_native__ @dca_agency; }
    location = /webhooks/telegram { try_files /__dca_native__ @dca_agency; }
    location = /mcp { try_files /__dca_native__ @dca_agency; }
    location ^~ /mcp/ { try_files /__dca_native__ @dca_agency; }
    location = /.well-known/oauth-protected-resource {
        try_files /__dca_native__ @dca_agency;
    }
    location ^~ /.well-known/oauth-protected-resource/ {
        try_files /__dca_native__ @dca_agency;
    }
    location / { try_files /__dca_native__ @dca_agency; }

    location @dca_agency {
        proxy_pass http://172.18.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }
}
