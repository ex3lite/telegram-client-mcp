# Include inside the existing HTTPS `server_name kakaduai.com` block.
# The API listens only on the Docker bridge gateway.

location ~ ^/(?:health/(?:live|ready)|webhooks/telegram|admin(?:/|$)|api/v1(?:/|$)) {
    client_max_body_size 1m;
    proxy_pass http://172.18.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ~ ^/(?:mcp(?:/|$)|\.well-known/oauth-protected-resource(?:/|$)) {
    proxy_pass http://172.18.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_read_timeout 3600s;
}
