# Include inside the existing HTTPS `server_name kakaduai.com` block.
# The API listens only on the Docker bridge gateway.

location = /health/live { try_files /__dca_proxy__ @dca; }
location = /health/ready { try_files /__dca_proxy__ @dca; }
location = /webhooks/telegram { try_files /__dca_proxy__ @dca; }
location = /admin { try_files /__dca_proxy__ @dca; }
location ^~ /admin/ { try_files /__dca_proxy__ @dca; }
location = /api/v1 { try_files /__dca_proxy__ @dca; }
location ^~ /api/v1/ { try_files /__dca_proxy__ @dca; }
location = /mcp { try_files /__dca_proxy__ @dca; }
location ^~ /mcp/ { try_files /__dca_proxy__ @dca; }
location = /.well-known/oauth-protected-resource { try_files /__dca_proxy__ @dca; }
location ^~ /.well-known/oauth-protected-resource/ { try_files /__dca_proxy__ @dca; }

location @dca {
    client_max_body_size 1m;
    proxy_pass http://172.18.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_read_timeout 3600s;
}
